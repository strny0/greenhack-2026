name: Publish Docker image

# Build the lean Grid Pulse image and push it to GHCR as :latest on every merge
# to main. We always overwrite :latest (no version tags) and prune the orphaned
# old layers so only the newest image is retained. The dataset + gridstats bundle
# are NOT in the image (the entrypoint prepares them into volumes at runtime), so
# the build is just deps + frontend — fast, and fully layer-cached between runs.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "dataset/overrides/**"
      - "docker/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image + package names
        id: vars
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "package=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :latest
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.image }}:latest
          provenance: false              # single manifest -> clean "keep only latest"
          cache-from: type=gha           # reuse unchanged layers (pip/npm) across runs
          cache-to: type=gha,mode=max

      # Same job (no second runner): drop orphaned untagged layers, keep :latest.
      - name: Prune orphaned (untagged) versions
        continue-on-error: true          # best-effort; nothing to prune on first run
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ steps.vars.outputs.package }}
          package-type: container
          delete-only-untagged-versions: true
