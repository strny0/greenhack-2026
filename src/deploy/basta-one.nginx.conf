# /etc/nginx/sites-available/grid-pulse  (basta.one — the public box)
# Reverse-proxies basta.one -> pc-praha over ZeroTier.
# Replace PRAHA_ZT_IP with pc-praha's ZeroTier address (10.147.19.x).
#
#   ln -s /etc/nginx/sites-available/grid-pulse /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# For HTTPS, run `certbot --nginx -d basta.one` after this is live.

server {
    listen 80;
    listen [::]:80;
    server_name basta.one;

    # Allow large what-if/chat payloads; demo-sized.
    client_max_body_size 25m;

    location / {
        proxy_pass http://PRAHA_ZT_IP:8099;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical for the NDJSON agent stream (/api/agent/stream):
        # disable buffering so tokens flush to the browser as they arrive.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
    }
}
